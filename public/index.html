<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧀 CheeseWithFriends 🧀</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="authScreen">

    <h1>🧀 CheeseWithFriends 🧀</h1>

    <div class="authBox">

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="login()">
            Login
        </button>

        <button onclick="signUp()">
            Create Account
        </button>

        <p id="authMessage"></p>

    </div>

    <div class="tabBox">

        <input
            type="text"
            id="tabNameInput"
            placeholder="Rename tab"
        >

        <button onclick="changeTabName()">
            Rename Tab
        </button>

    </div>

</div>

<div id="app">

    <div id="sidebar">

        <h2>Online</h2>

        <div id="onlineUsers"></div>

    </div>

    <div id="chatContainer">

        <div id="messages"></div>

        <div id="inputArea">

            <input
                type="text"
                id="messageInput"
                placeholder="Type a message..."
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
